services:
  resource-service:
    build:
      context: .
      dockerfile: resource-service/Dockerfile
    environment:
      RESOURCE_POSTGRES_HOST: postgres-resource
      RESOURCE_POSTGRES_PORT: 5432
      RESOURCE_POSTGRES_DB: ${RESOURCE_POSTGRES_DB}
      RESOURCE_POSTGRES_USER: ${RESOURCE_POSTGRES_USER}
      RESOURCE_POSTGRES_PASSWORD: ${RESOURCE_POSTGRES_PASSWORD}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka/
    ports:
      - ${RESOURCE_SERVICE_PORT}:8080

  postgres-resource:
    image: "postgres:18.3-alpine"
    ports:
      - ${RESOURCE_POSTGRES_PORT}:5432

    environment:
      POSTGRES_USER: ${RESOURCE_POSTGRES_USER}
      POSTGRES_PASSWORD: ${RESOURCE_POSTGRES_PASSWORD}
      POSTGRES_DB: ${RESOURCE_POSTGRES_DB}

    volumes:
      - ./init-scripts/resource-db/:/docker-entrypoint-initdb.d/
#      - ./resource-db-data/:/var/lib/postgresql

  song-service:
    build:
      context: .
      dockerfile: song-service/Dockerfile
    environment:
      SONG_POSTGRES_HOST: postgres-song
      SONG_POSTGRES_PORT: 5432
      SONG_POSTGRES_DB: ${SONG_POSTGRES_DB}
      SONG_POSTGRES_USER: ${SONG_POSTGRES_USER}
      SONG_POSTGRES_PASSWORD: ${SONG_POSTGRES_PASSWORD}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka/
    deploy:
      replicas: 2

    ports:
      - 8082-8083:8080

  postgres-song:
    image: "postgres:18.3-alpine"
    ports:
      - ${SONG_POSTGRES_PORT}:5432

    environment:
      POSTGRES_USER: ${SONG_POSTGRES_USER}
      POSTGRES_PASSWORD: ${SONG_POSTGRES_PASSWORD}
      POSTGRES_DB: ${SONG_POSTGRES_DB}

    volumes:
      - ./init-scripts/song-db/:/docker-entrypoint-initdb.d/
#      - ./song-db-data/:/var/lib/postgresql


  service-registry:
    build:
      context: .
      dockerfile: service-registry/Dockerfile
    ports:
      - 8761:8761